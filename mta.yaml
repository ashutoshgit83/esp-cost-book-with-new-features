_schema-version: "3.1"
ID: esp-cost-booking
version: 1.0.0
description: ESP Associate Cost Booking Application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install

modules:
  # ─── App Router ───
  - name: esp-cost-booking-router
    type: approuter.nodejs
    path: app/router
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: esp-cost-booking-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    build-parameters:
      builder: npm

  # ─── CAP Service ───
  - name: esp-cost-booking-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1024M
    requires:
      - name: esp-cost-booking-db
      - name: esp-cost-booking-xsuaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm

  # ─── HANA DB Deployer ───
  - name: esp-cost-booking-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: esp-cost-booking-db

resources:
  # ─── HANA Cloud Service ───
  - name: esp-cost-booking-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ─── XSUAA Service ───
  - name: esp-cost-booking-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
